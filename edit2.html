<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Éditeur Lives</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    padding: 30px 20px;
  }
  h1 { font-family: Arial Black; font-size: 20px; letter-spacing: 3px; color: #fff; margin-bottom: 6px; text-transform: uppercase; }
  .subtitle { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 24px; letter-spacing: 1px; }

  .calendar-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 520px;
  }
  .live-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
  }
  .live-header {
    font-family: Arial Black;
    font-size: 13px;
    letter-spacing: 2px;
    color: #fff;
    text-transform: uppercase;
    width: 60px;
    text-align: right;
    flex-shrink: 0;
  }
  .live-cell {
    flex: 1;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    padding: 8px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
    transition: all 0.3s;
  }
  .live-cell.green { background: rgba(34,197,94,0.2);   border-color: #22c55e; }
  .live-cell.red   { background: rgba(239,68,68,0.2);   border-color: #ef4444; }
  .live-cell.gray  { background: #6b7280;               border-color: #9ca3af; }

  .cell-textarea {
    flex: 1;
    min-height: 50px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: #fff;
    font-family: Impact, Arial Black;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 6px;
    resize: none;
    outline: none;
    text-align: center;
  }
  .cell-textarea:focus { border-color: rgba(255,255,255,0.35); }

  .color-btns {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .btn-color {
    width: 36px; height: 36px;
    border: none; border-radius: 6px;
    cursor: pointer; font-size: 15px; font-weight: 700;
    transition: transform 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-color:hover { transform: scale(1.15); }
  .btn-green { background: #22c55e; }
  .btn-red   { background: #ef4444; }
  .btn-gray  { background: #9ca3af; }
  .btn-clear { background: rgba(255,255,255,0.12); color: #fff; font-size: 14px; border: 1px solid rgba(255,255,255,0.25); }

  .saved-indicator {
    margin-top: 16px; font-size: 13px; color: #22c55e;
    letter-spacing: 1px; height: 20px; opacity: 0; transition: opacity 0.5s;
  }
  .saved-indicator.show { opacity: 1; }
  .loading { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 20px; }
</style>
</head>
<body>
<h1>🎛 Éditeur Lives</h1>
<div class="subtitle">Modifications en temps réel sur ton live</div>
<div class="loading" id="loadingMsg">Chargement...</div>
<div class="calendar-grid" id="calGrid" style="display:none"></div>
<div class="saved-indicator" id="savedMsg">✅ Sauvegardé !</div>

<script>
  const BIN_ID = 'd9b3e782f440cad27817';
  const API = 'https://api.npoint.io/' + BIN_ID;
  const lives = ['LIVE 1','LIVE 2','LIVE 3'];
  const grid = document.getElementById('calGrid');
  const savedMsg = document.getElementById('savedMsg');
  const loadingMsg = document.getElementById('loadingMsg');
  let state = {};
  let saveTimeout = null;

  async function saveData() {
    try {
      await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(state) });
      savedMsg.classList.add('show');
      clearTimeout(savedMsg._t);
      savedMsg._t = setTimeout(() => savedMsg.classList.remove('show'), 1500);
    } catch(e) {}
  }

  function scheduleSave() { clearTimeout(saveTimeout); saveTimeout = setTimeout(saveData, 600); }

  function buildUI() {
    grid.style.display = 'flex';
    loadingMsg.style.display = 'none';

    lives.forEach((live, i) => {
      const key = 'live-' + i;
      if (!state[key]) state[key] = { color: '', text: '' };

      const row = document.createElement('div'); row.className = 'live-row';
      const header = document.createElement('div'); header.className = 'live-header';
      header.textContent = live;
      row.appendChild(header);

      const cell = document.createElement('div');
      cell.className = 'live-cell' + (state[key].color ? ' ' + state[key].color : '');

      const textarea = document.createElement('textarea');
      textarea.className = 'cell-textarea';
      textarea.placeholder = '...';
      textarea.value = state[key].text || '';
      textarea.addEventListener('input', () => { state[key].text = textarea.value; scheduleSave(); });

      const colorBtns = document.createElement('div'); colorBtns.className = 'color-btns';
      [['green','🟢','btn-green'],['red','🔴','btn-red'],['gray','⬜','btn-gray'],['','✕','btn-clear']].forEach(([color, label, cls]) => {
        const btn = document.createElement('button');
        btn.className = 'btn-color ' + cls; btn.textContent = label;
        btn.addEventListener('click', () => {
          state[key].color = color;
          cell.className = 'live-cell' + (color ? ' ' + color : '');
          scheduleSave();
        });
        colorBtns.appendChild(btn);
      });

      cell.appendChild(textarea); cell.appendChild(colorBtns);
      row.appendChild(cell); grid.appendChild(row);
    });
  }

  fetch(API + '?t=' + Date.now(), { cache: 'no-store' })
    .then(r => r.json())
    .then(d => { state = d || {}; buildUI(); })
    .catch(() => { loadingMsg.textContent = '❌ Erreur de connexion.'; });
</script>
</body>
</html>
