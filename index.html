<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: Impact, Arial Black, sans-serif;
  }

  .overlay-wrapper {
    display: flex;
    flex-direction: row;
    height: 100vh;
    background: #000;
    border-right: 2px solid rgba(255,255,255,0.15);
  }

  .side-title {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    font-family: Impact, Arial Black, sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    padding: 16px 5px;
    border-right: 1px solid rgba(255,255,255,0.1);
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  .calendar-grid {
    display: flex;
    flex-direction: column;
    flex: 1;
    padding: 8px;
    gap: 6px;
    justify-content: center;
  }

  .day-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
  }

  .day-header {
    font-family: Impact, Arial Black, sans-serif;
    font-size: 15px;
    letter-spacing: 2px;
    color: #fff;
    text-transform: uppercase;
    width: 42px;
    text-align: right;
    flex-shrink: 0;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }

  .day-cell {
    width: 160px;
    height: 60px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 10px;
    transition: all 0.4s;
  }

  .day-cell.green {
    background: rgba(34,197,94,0.4);
    border-color: #22c55e;
    box-shadow: 0 0 14px rgba(34,197,94,0.4);
  }

  .day-cell.red {
    background: rgba(239,68,68,0.4);
    border-color: #ef4444;
    box-shadow: 0 0 14px rgba(239,68,68,0.4);
  }

  .cell-text {
    font-family: Impact, Arial Black, sans-serif;
    font-size: 15px;
    color: #fff;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1px;
    line-height: 1.3;
    white-space: pre-wrap;
    word-break: break-word;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
</style>
</head>
<body>
<div class="overlay-wrapper">
  <div class="side-title">Score de la semaine</div>
  <div class="calendar-grid" id="calGrid"></div>
</div>

<script>
  const BIN_ID = 'd9b3e782f440cad27817';
  const days = ['LUN','MAR','MER','JEU','VEN','SAM','DIM'];
  const grid = document.getElementById('calGrid');
  const cells = [];

  days.forEach((day, i) => {
    const row = document.createElement('div'); row.className = 'day-row';
    const header = document.createElement('div'); header.className = 'day-header';
    header.textContent = day;
    row.appendChild(header);
    const cell = document.createElement('div'); cell.className = 'day-cell';
    const text = document.createElement('div'); text.className = 'cell-text';
    cell.appendChild(text); row.appendChild(cell);
    grid.appendChild(row);
    cells.push({ cell, text });
  });

  async function load() {
    try {
      const res = await fetch('https://api.npoint.io/' + BIN_ID + '?t=' + Date.now(), { cache: 'no-store' });
      const data = await res.json();
      days.forEach((_, i) => {
        const d = data['day-' + i] || {};
        cells[i].cell.className = 'day-cell' + (d.color ? ' ' + d.color : '');
        cells[i].text.textContent = (d.text || '').toUpperCase();
      });
    } catch(e) {}
  }

  load();
  setInterval(load, 2000);
</script>
</body>
</html>
