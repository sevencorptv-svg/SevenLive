<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: Impact, Arial Black, sans-serif;
  }

  .overlay-wrapper {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    margin: 24px;
    background: #000;
    border-radius: 32px;
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 60px rgba(0,0,0,0.9);
    overflow: hidden;
    padding: 20px 20px 20px 0;
  }

  .side-title {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
    font-family: Impact, Arial Black, sans-serif;
    font-size: 20px;
    letter-spacing: 10px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    padding: 20px 16px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 2px solid rgba(255,255,255,0.07);
    margin-right: 20px;
  }

  .calendar-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    justify-content: center;
  }

  .day-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 16px;
  }

  .day-row.total-row {
    margin-top: 6px;
    padding-top: 16px;
    border-top: 2px solid rgba(255,255,255,0.1);
  }

  .day-header {
    font-family: Impact, Arial Black, sans-serif;
    font-size: 26px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    width: 72px;
    text-align: right;
    flex-shrink: 0;
  }

  .day-header.total-header {
    color: #fff;
  }

  .day-cell {
    width: 260px;
    height: 104px;
    border-radius: 24px;
    background: rgba(255,255,255,0.04);
    border: 3px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 20px;
    transition: all 0.35s ease;
  }

  .day-cell.total {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.3);
  }

  .day-cell.green {
    background: rgba(34, 197, 94, 0.35);
    border-color: #22c55e;
    box-shadow: 0 0 28px rgba(34,197,94,0.35), inset 0 2px 0 rgba(34,197,94,0.4);
  }
  .day-cell.red {
    background: rgba(239, 68, 68, 0.35);
    border-color: #ef4444;
    box-shadow: 0 0 28px rgba(239,68,68,0.35), inset 0 2px 0 rgba(239,68,68,0.4);
  }
  .day-cell.gray {
    background: #6b7280;
    border-color: #9ca3af;
    box-shadow: 0 0 28px rgba(107,114,128,0.5), inset 0 2px 0 rgba(255,255,255,0.15);
  }

  .cell-text {
    font-family: Impact, Arial Black, sans-serif;
    font-size: 26px;
    color: #fff;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1.3;
    white-space: pre-wrap;
    word-break: break-word;
    text-shadow: 0 2px 12px rgba(0,0,0,0.9);
  }
</style>
</head>
<body>
<div class="overlay-wrapper">
  <div class="side-title">Score de la semaine</div>
  <div class="calendar-grid" id="calGrid"></div>
</div>

<script>
  const BIN_ID = 'd9b3e782f440cad27817';
  const days = ['LUN','MAR','MER','JEU','VEN','SAM','DIM'];
  const grid = document.getElementById('calGrid');
  const cells = [];

  days.forEach((day, i) => {
    const row = document.createElement('div'); row.className = 'day-row';
    const header = document.createElement('div'); header.className = 'day-header';
    header.textContent = day;
    row.appendChild(header);
    const cell = document.createElement('div'); cell.className = 'day-cell';
    const text = document.createElement('div'); text.className = 'cell-text';
    cell.appendChild(text); row.appendChild(cell);
    grid.appendChild(row);
    cells.push({ cell, text });
  });

  // Ligne TOTAL
  const totalRow = document.createElement('div'); totalRow.className = 'day-row total-row';
  const totalHeader = document.createElement('div'); totalHeader.className = 'day-header total-header';
  totalHeader.textContent = 'TOTAL';
  totalRow.appendChild(totalHeader);
  const totalCell = document.createElement('div'); totalCell.className = 'day-cell total';
  const totalText = document.createElement('div'); totalText.className = 'cell-text';
  totalCell.appendChild(totalText); totalRow.appendChild(totalCell);
  grid.appendChild(totalRow);

  async function load() {
    try {
      const res = await fetch('https://api.npoint.io/' + BIN_ID + '?t=' + Date.now(), { cache: 'no-store' });
      const data = await res.json();
      days.forEach((_, i) => {
        const d = data['day-' + i] || {};
        cells[i].cell.className = 'day-cell' + (d.color ? ' ' + d.color : '');
        cells[i].text.textContent = (d.text || '').toUpperCase();
      });
      const t = data['total'] || {};
      totalCell.className = 'day-cell total' + (t.color ? ' ' + t.color : '');
      totalText.textContent = (t.text || '').toUpperCase();
    } catch(e) {}
  }

  load();
  setInterval(load, 2000);
</script>
</body>
</html>
