<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Impact, Arial Black, sans-serif;
  }

  .overlay-wrapper {
    margin: 16px;
    background: rgba(0, 0, 0, 0.93);
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,0.18);
    box-shadow: 0 4px 32px rgba(0,0,0,0.8);
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 300px;
  }

  .top-title {
    font-family: Impact, Arial Black;
    font-size: 13px;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    text-align: center;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
  }

  .grid-2col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .day-block { display: flex; flex-direction: column; gap: 4px; }

  .day-label {
    font-family: Impact, Arial Black;
    font-size: 13px; letter-spacing: 3px;
    color: #fff;
    text-transform: uppercase; text-align: center;
  }

  .score-cell {
    height: 56px; border-radius: 12px;
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    padding: 6px 10px; overflow: hidden; transition: all 0.4s ease;
  }
  .mvp-cell {
    height: 32px; border-radius: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    gap: 5px; padding: 3px 8px; overflow: hidden; transition: all 0.4s ease;
  }

  .score-cell.green { background: rgba(34,197,94,0.3);   border-color: #22c55e; box-shadow: 0 0 14px rgba(34,197,94,0.4); }
  .score-cell.red   { background: rgba(239,68,68,0.3);   border-color: #ef4444; box-shadow: 0 0 14px rgba(239,68,68,0.4); }
  .score-cell.gray  { background: rgba(120,128,140,0.4); border-color: #9ca3af; box-shadow: 0 0 14px rgba(120,128,140,0.3); }

  .mvp-cell.green { background: rgba(34,197,94,0.12);  border-color: rgba(34,197,94,0.4); }
  .mvp-cell.red   { background: rgba(239,68,68,0.12);  border-color: rgba(239,68,68,0.4); }
  .mvp-cell.gray  { background: rgba(120,128,140,0.2); border-color: rgba(156,163,175,0.5); }

  .cell-text {
    font-family: Impact, Arial Black;
    font-size: 20px; color: #fff; text-align: center; text-transform: uppercase;
    letter-spacing: 1px; line-height: 1.2; overflow: hidden; max-width: 100%;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    text-shadow: 0 2px 8px rgba(0,0,0,1); word-break: break-word;
  }
  .mvp-label {
    font-family: Arial Black;
    font-size: 8px; letter-spacing: 2px; color: rgba(255,255,255,0.4);
    text-transform: uppercase; flex-shrink: 0;
  }
  .mvp-text {
    font-family: Impact, Arial Black;
    font-size: 13px; color: #fff; text-align: center; text-transform: uppercase;
    letter-spacing: 0.5px; line-height: 1.2; overflow: hidden; max-width: 100%;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    text-shadow: 0 1px 6px rgba(0,0,0,1); word-break: break-word;
  }

  .total-section {
    display: flex; flex-direction: column; gap: 5px;
    padding-top: 8px;
    border-top: 2px solid rgba(255,255,255,0.12);
  }
  .total-label {
    font-family: Impact, Arial Black;
    font-size: 12px; letter-spacing: 5px; color: rgba(255,255,255,0.5);
    text-transform: uppercase; text-align: center;
  }
  .total-score-cell {
    height: 58px; border-radius: 12px;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    padding: 6px 14px; overflow: hidden; transition: all 0.4s ease;
  }
  .total-score-cell.green { background: rgba(34,197,94,0.3);   border-color: #22c55e; box-shadow: 0 0 20px rgba(34,197,94,0.4); }
  .total-score-cell.red   { background: rgba(239,68,68,0.3);   border-color: #ef4444; box-shadow: 0 0 20px rgba(239,68,68,0.4); }
  .total-score-cell.gray  { background: rgba(120,128,140,0.4); border-color: #9ca3af; }
  .total-text {
    font-family: Impact, Arial Black;
    font-size: 28px; color: #fff; text-align: center;
    letter-spacing: 2px; text-shadow: 0 2px 12px rgba(0,0,0,1);
    overflow: hidden; max-width: 100%;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
  }
  .total-mvp-cell {
    height: 34px; border-radius: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 4px 10px; overflow: hidden; transition: all 0.4s ease;
  }
  .total-mvp-cell.green { background: rgba(34,197,94,0.12);  border-color: rgba(34,197,94,0.4); }
  .total-mvp-cell.red   { background: rgba(239,68,68,0.12);  border-color: rgba(239,68,68,0.4); }
  .total-mvp-cell.gray  { background: rgba(120,128,140,0.2); border-color: rgba(156,163,175,0.5); }
</style>
</head>
<body>
<div class="overlay-wrapper">
  <div class="top-title">Score de la semaine</div>
  <div class="grid-2col" id="calGrid"></div>
  <div class="total-section">
    <div class="total-label">— Total —</div>
    <div class="total-score-cell" id="totalScoreCell">
      <div class="total-text" id="totalScoreText"></div>
    </div>
    <div class="total-mvp-cell" id="totalMvpCell">
      <span class="mvp-label">MVP</span>
      <div class="mvp-text" id="totalMvpText"></div>
    </div>
  </div>
</div>

<script>
  const BIN_ID = 'd9b3e782f440cad27817';
  const days = ['LUN','MAR','MER','JEU','VEN','SAM'];
  const order = [0,3,1,4,2,5];
  const grid = document.getElementById('calGrid');
  const cells = new Array(6);
  const mvpCells = new Array(6);

  order.forEach(i => {
    const block = document.createElement('div'); block.className = 'day-block';
    const label = document.createElement('div'); label.className = 'day-label'; label.textContent = days[i];
    block.appendChild(label);
    const scoreCell = document.createElement('div'); scoreCell.className = 'score-cell';
    const scoreText = document.createElement('div'); scoreText.className = 'cell-text';
    scoreCell.appendChild(scoreText); block.appendChild(scoreCell);
    const mvpCell = document.createElement('div'); mvpCell.className = 'mvp-cell';
    const mvpLabel = document.createElement('span'); mvpLabel.className = 'mvp-label'; mvpLabel.textContent = 'MVP';
    const mvpText = document.createElement('div'); mvpText.className = 'mvp-text';
    mvpCell.appendChild(mvpLabel); mvpCell.appendChild(mvpText);
    block.appendChild(mvpCell);
    grid.appendChild(block);
    cells[i] = { scoreCell, scoreText };
    mvpCells[i] = { mvpCell, mvpText };
  });

  function extractNumber(str) {
    if (!str) return 0;
    const match = str.replace(',', '.').match(/-?\d+(\.\d+)?/);
    return match ? parseFloat(match[0]) : 0;
  }

  async function load() {
    try {
      const res = await fetch('https://api.npoint.io/' + BIN_ID + '?t=' + Date.now(), { cache: 'no-store' });
      const data = await res.json();
      let sum = 0;
      days.forEach((_, i) => {
        const d = data['day-' + i] || {};
        const m = data['mvp-' + i] || {};
        cells[i].scoreCell.className = 'score-cell' + (d.color ? ' ' + d.color : '');
        cells[i].scoreText.textContent = (d.text || '').toUpperCase();
        mvpCells[i].mvpCell.className = 'mvp-cell' + (d.color ? ' ' + d.color : '');
        mvpCells[i].mvpText.textContent = (m.text || '').toUpperCase();
        sum += extractNumber(d.text);
      });
      const totalColor = sum > 0 ? 'green' : sum < 0 ? 'red' : 'gray';
      document.getElementById('totalScoreCell').className = 'total-score-cell ' + totalColor;
      document.getElementById('totalScoreText').textContent = sum;
      const mvpCount = {};
      days.forEach((_, i) => {
        const pseudo = (data['mvp-' + i]?.text || '').trim().toUpperCase();
        if (pseudo) mvpCount[pseudo] = (mvpCount[pseudo] || 0) + 1;
      });
      let topMvp = '', topCount = 0;
      Object.entries(mvpCount).forEach(([p, c]) => { if (c > topCount) { topCount = c; topMvp = p; } });
      document.getElementById('totalMvpCell').className = 'total-mvp-cell ' + totalColor;
      document.getElementById('totalMvpText').textContent = topMvp ? topMvp + (topCount > 1 ? ' ×' + topCount : '') : '';
    } catch(e) {}
  }

  load();
  setInterval(load, 2000);
</script>
</body>
</html>
