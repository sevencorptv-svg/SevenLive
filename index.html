<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: Impact, Arial Black, sans-serif;
  }
  .overlay-wrapper {
    margin: 16px;
    background: rgba(0,0,0,0.93);
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,0.18);
    box-shadow: 0 4px 32px rgba(0,0,0,0.8);
    padding: 14px;
    display: flex; flex-direction: column; gap: 8px;
    min-width: 300px;
  }
  .top-title {
    font-size: 13px; letter-spacing: 5px; color: rgba(255,255,255,0.5);
    text-transform: uppercase; text-align: center;
    padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.12);
  }
  .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .day-block { display: flex; flex-direction: column; gap: 4px; }
  .day-label { font-size: 13px; letter-spacing: 3px; color: #fff; text-transform: uppercase; text-align: center; }
  .score-cell {
    height: 56px; border-radius: 12px;
    background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    padding: 6px 10px; overflow: hidden; transition: all 0.4s;
  }
  .mvp-cell {
    height: 32px; border-radius: 8px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    gap: 5px; padding: 3px 8px; overflow: hidden; transition: all 0.4s;
  }
  .score-cell.green { background: rgba(34,197,94,0.3);  border-color: #22c55e; box-shadow: 0 0 14px rgba(34,197,94,0.4); }
  .score-cell.red   { background: rgba(239,68,68,0.3);  border-color: #ef4444; box-shadow: 0 0 14px rgba(239,68,68,0.4); }
  .mvp-cell.green   { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.4); }
  .mvp-cell.red     { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.4); }
  .cell-text {
    font-size: 20px; color: #fff; text-align: center; text-transform: uppercase;
    letter-spacing: 1px; line-height: 1.2; overflow: hidden; max-width: 100%;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    text-shadow: 0 2px 8px rgba(0,0,0,1); word-break: break-word;
  }
  .mvp-label { font-size: 8px; letter-spacing: 2px; color: rgba(255,255,255,0.4); text-transform: uppercase; flex-shrink: 0; }
  .mvp-text {
    font-size: 13px; color: #fff; text-align: center; text-transform: uppercase;
    letter-spacing: 0.5px; line-height: 1.2; overflow: hidden; max-width: 100%;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    text-shadow: 0 1px 6px rgba(0,0,0,1); word-break: break-word;
  }
  .enjeu-section {
    padding: 6px 10px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .enjeu-text {
    font-family: Impact, Arial Black;
    font-size: 13px; color: rgba(255,255,255,0.85);
    text-align: center; text-transform: uppercase;
    letter-spacing: 1.5px; line-height: 1.4;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  }
  .total-section {
    display: flex; flex-direction: column; gap: 5px;
    padding-top: 8px; border-top: 2px solid rgba(255,255,255,0.12);
  }
  .total-label { font-size: 12px; letter-spacing: 5px; color: rgba(255,255,255,0.5); text-transform: uppercase; text-align: center; }
  .total-score-cell {
    height: 58px; border-radius: 12px;
    background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    padding: 6px 14px; overflow: hidden; transition: all 0.4s;
  }
  .total-score-cell.green { background: rgba(34,197,94,0.3);  border-color: #22c55e; box-shadow: 0 0 20px rgba(34,197,94,0.4); }
  .total-score-cell.red   { background: rgba(239,68,68,0.3);  border-color: #ef4444; box-shadow: 0 0 20px rgba(239,68,68,0.4); }
  .total-text { font-size: 28px; color: #fff; text-align: center; letter-spacing: 2px; text-shadow: 0 2px 12px rgba(0,0,0,1); }
  .mvp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .total-mvp-cell {
    height: 46px; border-radius: 8px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px; padding: 4px 8px; overflow: hidden; transition: all 0.4s;
  }
  .total-mvp-cell.green { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.4); }
  .total-mvp-cell.red   { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.4); }
  .team-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; }
  .team-label.green { color: rgba(34,197,94,0.8); }
  .team-label.red   { color: rgba(239,68,68,0.8); }
</style>
</head>
<body>
<div class="overlay-wrapper">
  <div class="top-title">Score de la semaine</div>
  <div class="grid-2col" id="calGrid"></div>
  <div class="enjeu-section">
    <div class="enjeu-text" id="enjeuText">MVP DE L'EQUIPE GAGNANTE = MAITRE DE MON PSEUDO 7 JOURS</div>
  </div>
  <div class="total-section">
    <div class="total-label">— Total —</div>
    <div class="total-score-cell" id="totalScoreCell">
      <div class="total-text" id="totalScoreText"></div>
    </div>
    <div class="mvp-grid">
      <div class="total-mvp-cell green" id="mvpGreenCell">
        <span class="team-label green">⬡ Équipe Verte</span>
        <div class="mvp-text" id="mvpGreenText"></div>
      </div>
      <div class="total-mvp-cell red" id="mvpRedCell">
        <span class="team-label red">⬡ Équipe Rouge</span>
        <div class="mvp-text" id="mvpRedText"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const BIN_ID = 'd9b3e782f440cad27817';
  const DAYS = ['LUN','MAR','MER','JEU','VEN','SAM'];
  const ORDER = [0,3,1,4,2,5];
  const grid = document.getElementById('calGrid');
  const scoreCells = {}, scoreTexts = {}, mvpCells = {}, mvpTexts = {};

  ORDER.forEach(i => {
    const block = document.createElement('div'); block.className = 'day-block';
    const lbl = document.createElement('div'); lbl.className = 'day-label'; lbl.textContent = DAYS[i];
    block.appendChild(lbl);
    const sc = document.createElement('div'); sc.className = 'score-cell';
    const st = document.createElement('div'); st.className = 'cell-text';
    sc.appendChild(st); block.appendChild(sc);
    const mc = document.createElement('div'); mc.className = 'mvp-cell';
    const ml = document.createElement('span'); ml.className = 'mvp-label'; ml.textContent = 'MVP';
    const mt = document.createElement('div'); mt.className = 'mvp-text';
    mc.appendChild(ml); mc.appendChild(mt); block.appendChild(mc);
    grid.appendChild(block);
    scoreCells[i] = sc; scoreTexts[i] = st; mvpCells[i] = mc; mvpTexts[i] = mt;
  });

  function getNum(str) {
    if (!str && str !== 0) return null;
    const s = String(str).replace(',', '.').trim();
    if (s === '') return null;
    const m = s.match(/-?\d+(\.\d+)?/);
    return m ? parseFloat(m[0]) : null;
  }

  function getColor(text) {
    const n = getNum(text);
    if (n === null) return '';
    return n > 0 ? 'green' : 'red';
  }

  function topMvp(map) {
    let top = '', cnt = 0;
    Object.entries(map).forEach(([p,c]) => { if (c > cnt) { cnt = c; top = p; } });
    return top ? top + (cnt > 1 ? ' ×' + cnt : '') : '';
  }

  async function load() {
    try {
      const r = await fetch('https://api.npoint.io/' + BIN_ID + '?nocache=' + Date.now() + '_' + Math.random(), {
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache', 'Expires': '0' }
      });
      if (!r.ok) return;
      const data = await r.json();

      let sum = 0;
      const mvpG = {}, mvpR = {};

      DAYS.forEach((_, i) => {
        const d = data['day-' + i] || {};
        const m = data['mvp-' + i] || {};
        const color = getColor(d.text);
        const num = getNum(d.text);
        if (num !== null) sum += num;

        scoreCells[i].className = 'score-cell' + (color ? ' ' + color : '');
        scoreTexts[i].textContent = (d.text || '').toString().toUpperCase();
        mvpCells[i].className = 'mvp-cell' + (color ? ' ' + color : '');
        mvpTexts[i].textContent = (m.text || '').toUpperCase();

        const pseudo = (m.text || '').trim().toUpperCase();
        if (pseudo) {
          if (color === 'green') mvpG[pseudo] = (mvpG[pseudo] || 0) + 1;
          if (color === 'red')   mvpR[pseudo] = (mvpR[pseudo] || 0) + 1;
        }
      });

      const totalColor = sum > 0 ? 'green' : 'red';
      document.getElementById('totalScoreCell').className = 'total-score-cell ' + totalColor;
      document.getElementById('totalScoreText').textContent = sum;
      document.getElementById('mvpGreenText').textContent = topMvp(mvpG);
      document.getElementById('mvpRedText').textContent   = topMvp(mvpR);
      const enjeu = data['enjeu'] || {};
      if (enjeu.text) document.getElementById('enjeuText').textContent = enjeu.text.toUpperCase();
    } catch(e) {}
  }

  load();
  setInterval(load, 2000);
</script>
</body>
</html>
