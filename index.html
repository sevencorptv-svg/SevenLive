<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    min-height: 100vh;
    font-family: Arial Black, sans-serif;
  }
  .overlay-wrapper {
    width: 100%;
    padding: 10px 12px;
    background: #000;
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .day-col { display: flex; flex-direction: column; gap: 4px; }
  .day-header {
    text-align: center;
    font-family: Arial Black;
    font-size: 13px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.85);
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  .day-cell {
    min-height: 48px;
    border-radius: 7px;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5px;
    transition: all 0.4s;
  }
  .day-cell.green {
    background: rgba(34,197,94,0.35);
    border-color: rgba(34,197,94,0.8);
    box-shadow: 0 0 10px rgba(34,197,94,0.3);
  }
  .day-cell.red {
    background: rgba(239,68,68,0.35);
    border-color: rgba(239,68,68,0.8);
    box-shadow: 0 0 10px rgba(239,68,68,0.3);
  }
  .cell-text {
    font-family: Arial;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.95);
    text-align: center;
    line-height: 1.3;
    white-space: pre-wrap;
    word-break: break-word;
  }
</style>
</head>
<body>
<div class="overlay-wrapper">
  <div class="calendar-grid" id="calGrid"></div>
</div>
<script>
  const BIN_ID = 'd9b3e782f440cad27817';
  const API = 'https://api.npoint.io/' + BIN_ID;
  const days = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
  const grid = document.getElementById('calGrid');
  const cells = [];

  days.forEach((day, i) => {
    const col = document.createElement('div'); col.className = 'day-col';
    const h = document.createElement('div'); h.className = 'day-header'; h.textContent = day;
    col.appendChild(h);
    const cell = document.createElement('div'); cell.className = 'day-cell';
    const text = document.createElement('div'); text.className = 'cell-text';
    cell.appendChild(text); col.appendChild(cell); grid.appendChild(col);
    cells.push({ cell, text });
  });

  async function load() {
    try {
      const res = await fetch(API);
      const data = await res.json();
      days.forEach((_, i) => {
        const d = data['day-' + i] || {};
        cells[i].cell.className = 'day-cell' + (d.color ? ' ' + d.color : '');
        cells[i].text.textContent = d.text || '';
      });
    } catch(e) {}
  }

  load();
  setInterval(load, 2000);
</script>
</body>
</html>
