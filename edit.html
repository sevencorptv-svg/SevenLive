<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Éditeur Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    padding: 30px 20px;
  }
  h1 { font-family: Arial Black; font-size: 20px; letter-spacing: 3px; color: #fff; margin-bottom: 6px; text-transform: uppercase; }
  .subtitle { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 10px; letter-spacing: 1px; }
  .bin-info {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 10px 18px;
    margin-bottom: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    text-align: center;
    display: none;
  }
  .bin-info span { color: #22c55e; font-weight: 700; }
  .btn-download {
    margin-top: 8px;
    background: #22c55e;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .btn-download:hover { background: #16a34a; }
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 840px;
  }
  .day-col { display: flex; flex-direction: column; gap: 8px; }
  .day-header {
    text-align: center; font-family: Arial Black; font-size: 14px;
    letter-spacing: 1px; color: rgba(255,255,255,0.8);
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  .day-cell {
    border-radius: 10px; background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    padding: 8px; display: flex; flex-direction: column; gap: 8px; transition: all 0.3s;
  }
  .day-cell.green { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.6); }
  .day-cell.red { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.6); }
  .cell-textarea {
    width: 100%; min-height: 70px; background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
    color: #fff; font-family: Arial; font-size: 12px; font-weight: 600;
    padding: 6px; resize: none; outline: none; text-align: center;
  }
  .cell-textarea:focus { border-color: rgba(255,255,255,0.35); }
  .color-btns { display: flex; gap: 5px; justify-content: center; }
  .btn-color { flex: 1; padding: 5px 0; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; transition: transform 0.15s; }
  .btn-color:hover { transform: scale(1.05); }
  .btn-green { background: #22c55e; color: #000; }
  .btn-red { background: #ef4444; color: #fff; }
  .btn-clear { background: rgba(255,255,255,0.15); color: #fff; }
  .saved-indicator { margin-top: 16px; font-size: 12px; color: #22c55e; letter-spacing: 1px; height: 18px; opacity: 0; transition: opacity 0.5s; }
  .saved-indicator.show { opacity: 1; }
  .loading { color: rgba(255,255,255,0.4); font-size: 13px; margin-top: 20px; }
</style>
</head>
<body>
<h1>🎛 Éditeur Overlay</h1>
<div class="subtitle">Les modifications s'appliquent en temps réel sur ton live</div>
<div class="bin-info" id="binInfo">
  Stockage connecté ✅<br><br>
  <button class="btn-download" id="btnDownload">⬇ Télécharger index.html mis à jour</button>
</div>
<div class="loading" id="loadingMsg">Connexion à JSONBin...</div>
<div class="calendar-grid" id="calGrid" style="display:none"></div>
<div class="saved-indicator" id="savedMsg">✅ Sauvegardé !</div>

<script>
  const API_KEY = '$2a$10$rgzK1Do5nelHIz9JjBjUoOGqACgykE.7SgtSEKgxfitsKgzg.vIlO';
  const BASE = 'https://api.jsonbin.io/v3';
  const days = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
  const grid = document.getElementById('calGrid');
  const savedMsg = document.getElementById('savedMsg');
  const loadingMsg = document.getElementById('loadingMsg');
  const binInfo = document.getElementById('binInfo');
  let binId = localStorage.getItem('seven-overlay-binid');
  let state = {};
  let saveTimeout = null;

  async function createBin() {
    const res = await fetch(`${BASE}/b`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY, 'X-Bin-Name': 'SevenLiveOverlay', 'X-Bin-Private': 'false' },
      body: JSON.stringify({})
    });
    const data = await res.json();
    return data.metadata.id;
  }

  async function loadBin() {
    const res = await fetch(`${BASE}/b/${binId}/latest`, { headers: { 'X-Master-Key': API_KEY } });
    const data = await res.json();
    return data.record || {};
  }

  async function saveBin() {
    await fetch(`${BASE}/b/${binId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify(state)
    });
    savedMsg.classList.add('show');
    clearTimeout(savedMsg._t);
    savedMsg._t = setTimeout(() => savedMsg.classList.remove('show'), 1500);
  }

  function scheduleSave() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(saveBin, 800);
  }

  function buildUI() {
    grid.style.display = 'grid';
    loadingMsg.style.display = 'none';
    binInfo.style.display = 'block';

    days.forEach((day, i) => {
      const key = `day-${i}`;
      if (!state[key]) state[key] = { color: '', text: '' };
      const col = document.createElement('div'); col.className = 'day-col';
      const header = document.createElement('div'); header.className = 'day-header'; header.textContent = day;
      col.appendChild(header);
      const cell = document.createElement('div');
      cell.className = 'day-cell' + (state[key].color ? ' ' + state[key].color : '');
      const textarea = document.createElement('textarea'); textarea.className = 'cell-textarea';
      textarea.placeholder = '...'; textarea.value = state[key].text || '';
      textarea.addEventListener('input', () => { state[key].text = textarea.value; scheduleSave(); });
      const colorBtns = document.createElement('div'); colorBtns.className = 'color-btns';
      [['green','🟢','btn-green'],['red','🔴','btn-red'],['','✕','btn-clear']].forEach(([color, label, cls]) => {
        const btn = document.createElement('button'); btn.className = `btn-color ${cls}`; btn.textContent = label;
        btn.addEventListener('click', () => { state[key].color = color; cell.className = 'day-cell' + (color ? ' ' + color : ''); scheduleSave(); });
        colorBtns.appendChild(btn);
      });
      cell.appendChild(textarea); cell.appendChild(colorBtns); col.appendChild(cell); grid.appendChild(col);
    });

    document.getElementById('btnDownload').addEventListener('click', () => {
      const html = generateIndex();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([html], {type:'text/html'}));
      a.download = 'index.html'; a.click();
    });
  }

  function generateIndex() {
    return `<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><title>Overlay</title>
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Arial Black,sans-serif; }
.overlay-wrapper { width:780px;padding:16px;background:#000;border-radius:18px;border:1px solid rgba(255,255,255,0.15);box-shadow:0 8px 40px rgba(0,0,0,0.9); }
.overlay-title { text-align:center;font-family:Arial Black;font-size:20px;letter-spacing:4px;color:rgba(255,255,255,0.5);margin-bottom:14px;text-transform:uppercase; }
.calendar-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:8px; }
.day-col { display:flex;flex-direction:column;gap:6px; }
.day-header { text-align:center;font-family:Arial Black;font-size:16px;letter-spacing:2px;color:rgba(255,255,255,0.85);padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.15); }
.day-cell { min-height:80px;border-radius:10px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;padding:8px;transition:all 0.4s; }
.day-cell.green { background:rgba(34,197,94,0.3);border-color:rgba(34,197,94,0.7);box-shadow:0 0 14px rgba(34,197,94,0.25); }
.day-cell.red { background:rgba(239,68,68,0.3);border-color:rgba(239,68,68,0.7);box-shadow:0 0 14px rgba(239,68,68,0.25); }
.cell-text { font-family:Arial;font-size:12px;font-weight:700;color:rgba(255,255,255,0.95);text-align:center;line-height:1.4;white-space:pre-wrap;word-break:break-word; }
</style></head><body>
<div class="overlay-wrapper">
  <div class="overlay-title">Planning de la semaine</div>
  <div class="calendar-grid" id="calGrid"></div>
</div>
<script>
const API_KEY='${API_KEY}';const BIN_ID='${binId}';
const days=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
const grid=document.getElementById('calGrid');const cells=[];
days.forEach((day,i)=>{
  const col=document.createElement('div');col.className='day-col';
  const h=document.createElement('div');h.className='day-header';h.textContent=day;col.appendChild(h);
  const cell=document.createElement('div');cell.className='day-cell';
  const text=document.createElement('div');text.className='cell-text';
  cell.appendChild(text);col.appendChild(cell);grid.appendChild(col);cells.push({cell,text});
});
async function load(){
  try{
    const r=await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{headers:{'X-Master-Key':API_KEY}});
    const d=await r.json();const s=d.record||{};
    days.forEach((_,i)=>{const v=s['day-'+i]||{};cells[i].cell.className='day-cell'+(v.color?' '+v.color:'');cells[i].text.textContent=v.text||'';});
  }catch(e){}
}
load();setInterval(load,2000);
<\/script>
</body></html>`;
  }

  async function init() {
    try {
      if (!binId) {
        loadingMsg.textContent = 'Création du stockage en ligne...';
        binId = await createBin();
        localStorage.setItem('seven-overlay-binid', binId);
      } else {
        loadingMsg.textContent = 'Chargement des données...';
        state = await loadBin();
      }
      buildUI();
    } catch(e) {
      loadingMsg.textContent = '❌ Erreur. Vérifie ta connexion.';
    }
  }
  init();
</script>
</body>
</html>
