<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Éditeur Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    padding: 30px 20px;
  }

  h1 {
    font-family: Arial Black, sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: #fff;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 24px;
    letter-spacing: 1px;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 840px;
  }

  .day-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .day-header {
    text-align: center;
    font-family: Arial Black, sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.8);
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }

  .day-cell {
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: all 0.3s ease;
  }

  .day-cell.green {
    background: rgba(34, 197, 94, 0.2);
    border-color: rgba(34, 197, 94, 0.6);
  }

  .day-cell.red {
    background: rgba(239, 68, 68, 0.2);
    border-color: rgba(239, 68, 68, 0.6);
  }

  .cell-textarea {
    width: 100%;
    min-height: 70px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: #fff;
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px;
    resize: none;
    outline: none;
    text-align: center;
  }

  .cell-textarea:focus {
    border-color: rgba(255,255,255,0.35);
  }

  .color-btns {
    display: flex;
    gap: 5px;
    justify-content: center;
  }

  .btn-color {
    flex: 1;
    padding: 5px 0;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: transform 0.15s, opacity 0.15s;
  }

  .btn-color:hover { transform: scale(1.05); }
  .btn-color:active { transform: scale(0.97); }

  .btn-green { background: #22c55e; color: #000; }
  .btn-red { background: #ef4444; color: #fff; }
  .btn-clear { background: rgba(255,255,255,0.15); color: #fff; }

  .saved-indicator {
    margin-top: 20px;
    font-size: 12px;
    color: #22c55e;
    letter-spacing: 1px;
    height: 18px;
    transition: opacity 0.5s;
    opacity: 0;
  }

  .saved-indicator.show { opacity: 1; }
</style>
</head>
<body>

<h1>🎛 Éditeur Overlay</h1>
<div class="subtitle">Les modifications s'appliquent en temps réel sur ton live</div>

<div class="calendar-grid" id="calGrid"></div>
<div class="saved-indicator" id="savedMsg">✅ Sauvegardé !</div>

<script>
  const days = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi', 'Dimanche'];
  const grid = document.getElementById('calGrid');
  const savedMsg = document.getElementById('savedMsg');

  const state = JSON.parse(localStorage.getItem('seven-overlay') || '{}');

  function save() {
    localStorage.setItem('seven-overlay', JSON.stringify(state));
    savedMsg.classList.add('show');
    clearTimeout(save._t);
    save._t = setTimeout(() => savedMsg.classList.remove('show'), 1500);
  }

  days.forEach((day, i) => {
    const key = `day-${i}`;
    if (!state[key]) state[key] = { color: '', text: '' };

    const col = document.createElement('div');
    col.className = 'day-col';

    const header = document.createElement('div');
    header.className = 'day-header';
    header.textContent = day;
    col.appendChild(header);

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (state[key].color ? ' ' + state[key].color : '');

    const textarea = document.createElement('textarea');
    textarea.className = 'cell-textarea';
    textarea.placeholder = '...';
    textarea.value = state[key].text || '';
    textarea.addEventListener('input', () => {
      state[key].text = textarea.value;
      save();
    });

    const colorBtns = document.createElement('div');
    colorBtns.className = 'color-btns';

    const btnGreen = document.createElement('button');
    btnGreen.className = 'btn-color btn-green';
    btnGreen.textContent = '🟢';
    btnGreen.addEventListener('click', () => {
      state[key].color = 'green';
      cell.className = 'day-cell green';
      save();
    });

    const btnRed = document.createElement('button');
    btnRed.className = 'btn-color btn-red';
    btnRed.textContent = '🔴';
    btnRed.addEventListener('click', () => {
      state[key].color = 'red';
      cell.className = 'day-cell red';
      save();
    });

    const btnClear = document.createElement('button');
    btnClear.className = 'btn-color btn-clear';
    btnClear.textContent = '✕';
    btnClear.addEventListener('click', () => {
      state[key].color = '';
      cell.className = 'day-cell';
      save();
    });

    colorBtns.appendChild(btnGreen);
    colorBtns.appendChild(btnRed);
    colorBtns.appendChild(btnClear);

    cell.appendChild(textarea);
    cell.appendChild(colorBtns);
    col.appendChild(cell);
    grid.appendChild(col);
  });
</script>

</body>
</html>
