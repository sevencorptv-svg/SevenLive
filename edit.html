<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Éditeur Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: Arial, sans-serif; padding: 10px; }
  h1 { font-family: Arial Black; font-size: 14px; letter-spacing: 2px; color: #fff; margin-bottom: 2px; text-transform: uppercase; }
  .subtitle { font-size: 9px; color: rgba(255,255,255,0.35); margin-bottom: 8px; text-align: center; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; width: 100%; max-width: 700px; }
  .block { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 6px; display: flex; flex-direction: column; gap: 3px; }
  .block.green { background: rgba(34,197,94,0.08); border-color: rgba(34,197,94,0.3); }
  .block.red   { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); }
  .day-lbl { font-family: Arial Black; font-size: 11px; letter-spacing: 1px; color: #fff; text-transform: uppercase; text-align: center; margin-bottom: 2px; }
  .row { display: flex; align-items: center; gap: 4px; }
  .row-lbl { font-family: Arial Black; font-size: 9px; letter-spacing: 1px; color: rgba(255,255,255,0.4); text-transform: uppercase; width: 34px; text-align: right; flex-shrink: 0; }
  .cell-ta {
    flex: 1; height: 26px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px; color: #fff; font-family: Impact, Arial Black; font-size: 12px;
    text-transform: uppercase; padding: 2px 4px; resize: none; outline: none; text-align: center;
  }
  .cell-ta:focus { border-color: rgba(255,255,255,0.4); }
  .total-section { width: 100%; max-width: 700px; margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.15); }
  .total-block { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  .total-lbl { font-family: Arial Black; font-size: 11px; letter-spacing: 2px; color: #fff; text-transform: uppercase; text-align: center; }
  .total-val { height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: Impact, Arial Black; font-size: 18px; color: #fff; letter-spacing: 1px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
  .total-val.green { background: rgba(34,197,94,0.2); border-color: #22c55e; }
  .total-val.red   { background: rgba(239,68,68,0.2); border-color: #ef4444; }
  .mvp-row-total { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .mvp-box { border-radius: 6px; padding: 4px 6px; display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .mvp-box.green { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
  .mvp-box.red   { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
  .mvp-team-lbl { font-family: Arial Black; font-size: 8px; letter-spacing: 1px; text-transform: uppercase; }
  .mvp-team-lbl.green { color: rgba(34,197,94,0.8); }
  .mvp-team-lbl.red   { color: rgba(239,68,68,0.8); }
  .mvp-val { font-family: Impact, Arial Black; font-size: 12px; color: #fff; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
  .saved { margin-top: 5px; font-size: 10px; color: #22c55e; text-align: center; height: 12px; opacity: 0; transition: opacity 0.4s; }
  .saved.show { opacity: 1; }
  .loading { color: rgba(255,255,255,0.4); font-size: 12px; }
</style>
</head>
<body>
<h1>🎛 Éditeur Overlay</h1>
<div class="subtitle">Score ≤ 0 = Rouge · Score > 0 = Vert · Modifications en temps réel</div>
<div class="loading" id="loadingMsg">Chargement...</div>
<div class="grid" id="grid" style="display:none"></div>
<div class="total-section" id="totalSection" style="display:none">
  <div class="total-block">
    <div class="total-lbl">TOTAL (auto)</div>
    <div class="total-val" id="totalVal">0</div>
    <div class="mvp-row-total">
      <div class="mvp-box green">
        <span class="mvp-team-lbl green">⬡ Équipe Verte</span>
        <div class="mvp-val" id="mvpGreenVal">...</div>
      </div>
      <div class="mvp-box red">
        <span class="mvp-team-lbl red">⬡ Équipe Rouge</span>
        <div class="mvp-val" id="mvpRedVal">...</div>
      </div>
    </div>
  </div>
</div>
<div class="saved" id="savedMsg">✅ Sauvegardé !</div>

<script>
  const BIN_ID = 'd9b3e782f440cad27817';
  const API = 'https://api.npoint.io/' + BIN_ID;
  const DAYS = ['LUN','MAR','MER','JEU','VEN','SAM'];
  const ORDER = [0,3,1,4,2,5];
  let state = {};
  let saveTimer = null;
  const blocks = {};
  const scoreTA = {};
  const mvpTA = {};

  function getNum(str) {
    if (!str && str !== 0) return null;
    const s = String(str).replace(',', '.').trim();
    if (s === '') return null;
    const m = s.match(/-?\d+(\.\d+)?/);
    return m ? parseFloat(m[0]) : null;
  }

  function getColor(text) {
    const n = getNum(text);
    if (n === null) return '';
    return n > 0 ? 'green' : 'red';
  }

  function topMvp(map) {
    let top = '', cnt = 0;
    Object.entries(map).forEach(([p,c]) => { if (c > cnt) { cnt = c; top = p; } });
    return top ? top + (cnt > 1 ? ' ×' + cnt : '') : '...';
  }

  function updateTotal() {
    let sum = 0;
    const mvpG = {}, mvpR = {};
    DAYS.forEach((_, i) => {
      const txt = state['day-' + i]?.text || '';
      const mvpTxt = (state['mvp-' + i]?.text || '').trim().toUpperCase();
      const color = getColor(txt);
      const n = getNum(txt);
      if (n !== null) sum += n;
      // update block color
      if (blocks[i]) blocks[i].className = 'block' + (color ? ' ' + color : '');
      // MVP tally
      if (mvpTxt) {
        if (color === 'green') mvpG[mvpTxt] = (mvpG[mvpTxt] || 0) + 1;
        if (color === 'red')   mvpR[mvpTxt] = (mvpR[mvpTxt] || 0) + 1;
      }
    });
    const totalColor = sum > 0 ? 'green' : 'red';
    const tv = document.getElementById('totalVal');
    tv.textContent = sum;
    tv.className = 'total-val ' + totalColor;
    document.getElementById('mvpGreenVal').textContent = topMvp(mvpG);
    document.getElementById('mvpRedVal').textContent   = topMvp(mvpR);
    state['total'] = { text: String(sum), color: totalColor };
  }

  async function save() {
    try {
      await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(state) });
      const msg = document.getElementById('savedMsg');
      msg.classList.add('show');
      clearTimeout(msg._t);
      msg._t = setTimeout(() => msg.classList.remove('show'), 1500);
    } catch(e) {}
  }

  function scheduleSave() {
    updateTotal();
    clearTimeout(saveTimer);
    saveTimer = setTimeout(save, 500);
  }

  function buildUI() {
    const grid = document.getElementById('grid');
    grid.style.display = 'grid';
    document.getElementById('totalSection').style.display = 'block';
    document.getElementById('loadingMsg').style.display = 'none';

    ORDER.forEach(i => {
      if (!state['day-' + i]) state['day-' + i] = { text: '', color: '' };
      if (!state['mvp-' + i]) state['mvp-' + i] = { text: '' };

      const color = getColor(state['day-' + i].text);
      const block = document.createElement('div');
      block.className = 'block' + (color ? ' ' + color : '');
      blocks[i] = block;

      const lbl = document.createElement('div'); lbl.className = 'day-lbl'; lbl.textContent = DAYS[i];
      block.appendChild(lbl);

      // Score row
      const sRow = document.createElement('div'); sRow.className = 'row';
      const sLbl = document.createElement('span'); sLbl.className = 'row-lbl'; sLbl.textContent = 'SCORE';
      const sTa = document.createElement('textarea'); sTa.className = 'cell-ta';
      sTa.placeholder = '0'; sTa.value = state['day-' + i].text || '';
      sTa.addEventListener('input', () => { state['day-' + i].text = sTa.value; scheduleSave(); });
      sRow.appendChild(sLbl); sRow.appendChild(sTa); block.appendChild(sRow);
      scoreTA[i] = sTa;

      // MVP row
      const mRow = document.createElement('div'); mRow.className = 'row';
      const mLbl = document.createElement('span'); mLbl.className = 'row-lbl'; mLbl.textContent = 'MVP';
      const mTa = document.createElement('textarea'); mTa.className = 'cell-ta';
      mTa.placeholder = '...'; mTa.value = state['mvp-' + i].text || '';
      mTa.addEventListener('input', () => { state['mvp-' + i].text = mTa.value; scheduleSave(); });
      mRow.appendChild(mLbl); mRow.appendChild(mTa); block.appendChild(mRow);
      mvpTA[i] = mTa;

      grid.appendChild(block);
    });

    updateTotal();
  }

  fetch(API + '?nocache=' + Date.now(), { cache: 'no-store', headers: { 'Cache-Control': 'no-cache' } })
    .then(r => r.json())
    .then(d => { state = d || {}; buildUI(); })
    .catch(() => { document.getElementById('loadingMsg').textContent = '❌ Erreur de connexion.'; });
</script>
</body>
</html>
